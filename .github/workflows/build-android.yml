name: Build and Release Android APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build for Android 📱
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: Android
          buildMethod: Reactor.Editor.BuildCommand.PerformBuild
          unityVersion: 6000.3.5f2
          androidAppBundle: false # Output APK instead of AAB

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/Android/ReactorAR.apk
          tag_name: v${{ github.run_number }}
          name: Build Release v${{ github.run_number }}
          body: "Automatic build from commit ${{ github.sha }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
